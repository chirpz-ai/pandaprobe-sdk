name: CI — Python SDK

on:
  push:
    branches: [main]
    paths:
      - "libraries/python/**"
      - ".github/**"
  pull_request:
    branches: [main]
    paths:
      - "libraries/python/**"
      - ".github/**"
  workflow_dispatch:

jobs:
  # ============================================================================
  # Python CI
  # ============================================================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: make sync

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

  python-test:
    name: Python Test ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: libraries/python
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: make sync

      - name: Test
        run: make test-cov
